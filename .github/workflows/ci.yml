name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ghost-server:
    name: ghost-server · typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ghost-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck
      - run: npm test # 20 unit + integration tests

  e2e:
    name: e2e · real server ↔ real cli client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: npm install
        working-directory: ghost-server
      - run: bun test --timeout 60000
        working-directory: e2e

  client:
    name: client · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
