name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ghost-server:
    name: ghost-server · typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ghost-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck
      - run: npm test

  client:
    name: client · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
